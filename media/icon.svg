<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <!-- Modern gradient backgrounds -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#16213e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f0f23;stop-opacity:1" />
    </linearGradient>
    
    <!-- Accent gradient (purple-blue) -->
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a855f7;stop-opacity:1" />
    </linearGradient>
    
    <!-- Glass effect gradient -->
    <linearGradient id="glassGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.15" />
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0.02" />
    </linearGradient>
    
    <!-- Lens gradient -->
    <linearGradient id="lensGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#60a5fa;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#818cf8;stop-opacity:0.1" />
    </linearGradient>
    
    <!-- Glow filter -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <!-- Drop shadow -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Background Circle with gradient -->
  <circle cx="64" cy="64" r="62" fill="url(#bgGrad)"/>
  
  <!-- Subtle ring effect -->
  <circle cx="64" cy="64" r="58" fill="none" stroke="url(#accentGrad)" stroke-width="0.5" opacity="0.3"/>
  
  <!-- Certificate/Document shape -->
  <g filter="url(#shadow)">
    <rect x="32" y="28" width="48" height="60" rx="6" fill="#1e1e3f" stroke="url(#accentGrad)" stroke-width="1.5"/>
    <rect x="32" y="28" width="48" height="60" rx="6" fill="url(#glassGrad)"/>
    
    <!-- Certificate lines -->
    <rect x="40" y="40" width="32" height="3" rx="1.5" fill="url(#accentGrad)" opacity="0.8"/>
    <rect x="40" y="48" width="24" height="2" rx="1" fill="#4b5563"/>
    <rect x="40" y="54" width="28" height="2" rx="1" fill="#4b5563"/>
    <rect x="40" y="60" width="20" height="2" rx="1" fill="#4b5563"/>
    
    <!-- Checkmark circle -->
    <circle cx="56" cy="74" r="8" fill="url(#accentGrad)"/>
    <path d="M52 74 L55 77 L60 71" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  
  <!-- Magnifying glass / Lens -->
  <g filter="url(#glow)">
    <!-- Lens circle -->
    <circle cx="78" cy="70" r="22" fill="url(#lensGrad)" stroke="url(#accentGrad)" stroke-width="3"/>
    <circle cx="78" cy="70" r="18" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
    
    <!-- Lens shine -->
    <ellipse cx="72" cy="64" rx="6" ry="4" fill="rgba(255,255,255,0.2)" transform="rotate(-30 72 64)"/>
    
    <!-- Handle -->
    <line x1="94" y1="86" x2="108" y2="100" stroke="url(#accentGrad)" stroke-width="6" stroke-linecap="round"/>
    <line x1="95" y1="87" x2="106" y2="98" stroke="#a78bfa" stroke-width="3" stroke-linecap="round" opacity="0.5"/>
  </g>
  
  <!-- SSL Lock icon inside lens -->
  <g transform="translate(78, 70)">
    <!-- Lock body -->
    <rect x="-8" y="-2" width="16" height="12" rx="2" fill="url(#accentGrad)"/>
    
    <!-- Lock shackle -->
    <path d="M-5 -2 L-5 -6 C-5 -10 0 -13 0 -13 C0 -13 5 -10 5 -6 L5 -2" 
          fill="none" stroke="url(#accentGrad)" stroke-width="3" stroke-linecap="round"/>
    
    <!-- Keyhole -->
    <circle cx="0" cy="3" r="2" fill="#0f0f23"/>
    <rect x="-1" y="3" width="2" height="4" fill="#0f0f23"/>
  </g>
  
  <!-- Decorative particles -->
  <circle cx="25" cy="45" r="2" fill="url(#accentGrad)" opacity="0.6"/>
  <circle cx="105" cy="35" r="1.5" fill="url(#accentGrad)" opacity="0.5"/>
  <circle cx="20" cy="85" r="1" fill="url(#accentGrad)" opacity="0.4"/>
</svg>
