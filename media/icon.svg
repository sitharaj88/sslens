<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a73e8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d47a1;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="lockGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e0e0e0;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4caf50;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2e7d32;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background Circle -->
  <circle cx="64" cy="64" r="60" fill="url(#bgGrad)"/>
  
  <!-- Shield Shape -->
  <path d="M64 20 L100 35 L100 65 C100 85 85 100 64 108 C43 100 28 85 28 65 L28 35 Z" 
        fill="url(#shieldGrad)" 
        stroke="#1b5e20" 
        stroke-width="2"/>
  
  <!-- Lock Body -->
  <rect x="48" y="55" width="32" height="28" rx="4" fill="url(#lockGrad)" stroke="#9e9e9e" stroke-width="1"/>
  
  <!-- Lock Shackle -->
  <path d="M52 55 L52 45 C52 38 57 33 64 33 C71 33 76 38 76 45 L76 55" 
        fill="none" 
        stroke="url(#lockGrad)" 
        stroke-width="6" 
        stroke-linecap="round"/>
  <path d="M52 55 L52 45 C52 38 57 33 64 33 C71 33 76 38 76 45 L76 55" 
        fill="none" 
        stroke="#9e9e9e" 
        stroke-width="1" 
        stroke-linecap="round"/>
  
  <!-- Keyhole -->
  <circle cx="64" cy="66" r="4" fill="#0d47a1"/>
  <rect x="62" y="66" width="4" height="8" fill="#0d47a1"/>
  
  <!-- Checkmark -->
  <path d="M85 38 L92 45 L105 28" 
        fill="none" 
        stroke="#ffffff" 
        stroke-width="4" 
        stroke-linecap="round" 
        stroke-linejoin="round"/>
</svg>
