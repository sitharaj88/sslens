<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Modern Tech Gradient: Royal Purple to Deep Dark -->
    <linearGradient id="premium-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#A855F7"/> <!-- Purple 500 -->
      <stop offset="40%" stop-color="#581C87"/> <!-- Purple 900 -->
      <stop offset="100%" stop-color="#1C0335"/> <!-- Almost Black Purple -->
    </linearGradient>

    <!-- Chrome/Titanium Rim Gradient -->
    <linearGradient id="rim-gradient" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F1F5F9"/> <!-- Slate 100 -->
      <stop offset="50%" stop-color="#94A3B8"/> <!-- Slate 400 -->
      <stop offset="100%" stop-color="#334155"/> <!-- Slate 700 -->
    </linearGradient>

    <!-- Brushed Gold Gradient -->
    <linearGradient id="gold-gradient" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FDE047"/> <!-- Yellow 300 -->
      <stop offset="25%" stop-color="#D97706"/> <!-- Amber 600 -->
      <stop offset="50%" stop-color="#B45309"/> <!-- Amber 700 -->
      <stop offset="75%" stop-color="#D97706"/> <!-- Amber 600 -->
      <stop offset="100%" stop-color="#FCD34D"/> <!-- Yellow 300 -->
    </linearGradient>

    <!-- Soft Drop Shadow -->
    <filter id="soft-shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="16" stdDeviation="16" flood-color="#000" flood-opacity="0.6"/>
    </filter>

    <!-- Inner Glow -->
    <filter id="inner-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="arithmetic" k2="1" k3="1"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" fill="url(#premium-bg)"/>
  
  <!-- Subtle Grain/Texture Overlay (using simple opacity pattern) -->
  <rect width="512" height="512" fill="white" fill-opacity="0.02"/>

  <!-- Magnifying Glass Handle -->
  <path d="M335 335 L435 435" stroke="url(#rim-gradient)" stroke-width="45" stroke-linecap="round" filter="url(#soft-shadow)"/>

  <!-- Magnifying Glass Rim -->
  <circle cx="225" cy="225" r="135" stroke="url(#rim-gradient)" stroke-width="18" fill="none" filter="url(#soft-shadow)"/>
  
  <!-- Glass Lens Darkening -->
  <circle cx="225" cy="225" r="126" fill="#000" fill-opacity="0.3"/>

  <!-- Lock Icon -->
  <g transform="translate(160, 170) scale(1.3)">
    <path d="M25 35 V 25 C 25 11.2 36.2 0 50 0 C 63.8 0 75 11.2 75 25 V 35" stroke="url(#gold-gradient)" stroke-width="14" fill="none"/>
    <rect x="10" y="35" width="80" height="60" rx="8" fill="url(#gold-gradient)"/>
    <circle cx="50" cy="65" r="7" fill="#422006"/>
    <path d="M50 65 L50 80" stroke="#422006" stroke-width="5" stroke-linecap="round"/>
  </g>

  <!-- High Gloss Reflection on Glass -->
  <path d="M140 180 A 100 100 0 0 1 290 140" stroke="white" stroke-width="8" stroke-opacity="0.25" stroke-linecap="round" fill="none"/>
  
  <!-- Bottom Highlight -->
  <path d="M180 300 A 90 90 0 0 0 270 300" stroke="white" stroke-width="4" stroke-opacity="0.1" stroke-linecap="round" fill="none"/>

</svg>
