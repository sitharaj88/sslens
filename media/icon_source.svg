<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Chosen Premium Background: Royal Midnight -->
    <!-- Deep Indigo transitioning into Void Black - aligns with the VS Code extension ecosystem vibe -->
    <linearGradient id="premium-bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#312E81"/> <!-- Indigo 900 -->
      <stop offset="45%" stop-color="#1E1B4B"/> <!-- Indigo 950 -->
      <stop offset="100%" stop-color="#020617"/> <!-- Slate 950 -->
    </linearGradient>

    <!-- Metallic Rim -->
    <linearGradient id="rim-gradient" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#E2E8F0"/>
      <stop offset="50%" stop-color="#94A3B8"/>
      <stop offset="100%" stop-color="#475569"/>
    </linearGradient>

    <!-- Rich Gold -->
    <linearGradient id="gold-gradient" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FCD34D"/> <!-- Amber 300 -->
      <stop offset="50%" stop-color="#D97706"/> <!-- Amber 600 -->
      <stop offset="100%" stop-color="#78350F"/> <!-- Amber 900 -->
    </linearGradient>

    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="12" stdDeviation="12" flood-color="#000" flood-opacity="0.6"/>
    </filter>

    <radialGradient id="sheen" cx="50%" cy="0%" r="100%">
        <stop offset="0%" stop-color="white" stop-opacity="0.15"/>
        <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" fill="url(#premium-bg)"/>
  
  <!-- Subtle Top Sheen -->
  <rect width="512" height="512" fill="url(#sheen)"/>

  <!-- Magnifying Glass -->
  <!-- Handle -->
  <path d="M335 335 L435 435" stroke="url(#rim-gradient)" stroke-width="45" stroke-linecap="round" filter="url(#shadow)"/>
  
  <!-- Lens Frame -->
  <circle cx="225" cy="225" r="135" stroke="url(#rim-gradient)" stroke-width="18" filter="url(#shadow)" fill="none"/>
  
  <!-- Lens Glass -->
  <circle cx="225" cy="225" r="126" fill="#1E293B" fill-opacity="0.4"/>
  
  <!-- Lock Icon -->
  <g transform="translate(160, 170) scale(1.3)">
    <!-- Shackle -->
    <path d="M25 35 V 25 C 25 11.2 36.2 0 50 0 C 63.8 0 75 11.2 75 25 V 35" stroke="url(#gold-gradient)" stroke-width="14" fill="none"/>
    <!-- Body -->
    <rect x="10" y="35" width="80" height="60" rx="8" fill="url(#gold-gradient)"/>
    <!-- Keyhole -->
    <circle cx="50" cy="65" r="7" fill="#2c1a06"/>
    <path d="M50 65 L50 80" stroke="#2c1a06" stroke-width="5" stroke-linecap="round"/>
  </g>

  <!-- Lens Gloss/Reflection -->
  <path d="M140 180 A 100 100 0 0 1 290 140" stroke="white" stroke-width="6" stroke-opacity="0.3" stroke-linecap="round" fill="none"/>
</svg>
